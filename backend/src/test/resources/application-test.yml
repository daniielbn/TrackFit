spring:
  datasource:
    url: jdbc:h2:mem:training_app_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

app:
  jwt:
    secret: test_secret_with_more_than_32_characters_for_hs256
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:5173
